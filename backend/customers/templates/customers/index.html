<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>efood</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>

    <body class="bg-light">

        <div class="container mt-5">

            <!-- HEADER -->
            <div class="d-flex justify-content-between align-items-center mb-4 gap-3">
                    <h1 class="text-success text-center w-100">Welcome to efood delivery system</h1>
                    <!-- SEARCH BAR -->
             <form method="GET" class="mb-4">
                <div class="input-group mx-auto" style="max-width: 500px;">
                    <input type="text"
                        name="q"
                        class="form-control"
                        placeholder="Search restaurant or city..."
                        value="{{ query|default:'' }}">
                    <button class="btn btn-success" type="submit">
                        Search
                    </button>
                </div>
             </form>


                    <!-- CART LINK -->
                    <a href="{% url 'view_cart' %}" class="btn btn-outline-primary">
                        🛒 Cart
                    </a>
            </div>

            <div class="row">

                {% for restaurant in restaurants %}
                <div class="col-md-4">
                    <div class="card mb-4 shadow h-100">
                        <div class="card-body d-flex flex-column">

                            <h5 class="card-title">{{ restaurant.rest_name }}</h5>

                            <p class="card-text mb-3">
                                📍 {{ restaurant.rest_city }} <br>
                                📞 {{ restaurant.rest_contact }}
                            </p>

                            <!-- VIEW MENU BUTTON -->
                            <a href="{% url 'restaurant_menu' restaurant.id %}"
                            class="btn btn-success btn-sm mt-auto">
                                View Menu
                            </a>

                        </div>
                    </div>
                </div>
                {% empty %}
                <p class="text-center">No restaurants available</p>
                {% endfor %}

            </div>
        </div>

    </body>
</html>
