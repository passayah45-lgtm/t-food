name: T-Food CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: t-food-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DJANGO_SECRET_KEY: ci-not-for-production-change-me
  DEBUG: "False"
  APP_ENV: ci
  ALLOWED_HOSTS: localhost,127.0.0.1
  CSRF_TRUSTED_ORIGINS: http://localhost,http://127.0.0.1
  CORS_ALLOWED_ORIGINS: http://localhost,http://127.0.0.1
  SECURE_SSL_REDIRECT: "False"
  REDIS_URL: redis://localhost:6379/1
  CHANNEL_REDIS_URL: redis://localhost:6379/4
  MONITORING_ENABLED: "True"
  METRICS_ENABLED: "True"
  ERROR_REPORTING_ENABLED: "False"

jobs:
  backend:
    name: Backend validation
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django system check
        run: python manage.py check

      - name: Migration check
        run: python manage.py makemigrations --check --dry-run

      - name: Backend tests
        run: >
          python manage.py test
          fooddelivery api restaurants verifications notifications orders delivery
          payments ledger realtime merchant_staff operations_access intelligence
          user_preferences

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  docker:
    name: Docker validation
    runs-on: ubuntu-latest

    env:
      DJANGO_SECRET_KEY: ci-docker-not-for-production-change-me
      POSTGRES_PASSWORD: ci-postgres-password
      ALLOWED_HOSTS: localhost,127.0.0.1
      CSRF_TRUSTED_ORIGINS: http://localhost,http://127.0.0.1
      CORS_ALLOWED_ORIGINS: http://localhost,http://127.0.0.1
      SECURE_SSL_REDIRECT: "False"
      APP_ENV: ci
      APP_PORT: "8088"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Compose config
        run: docker compose config --quiet

      - name: Build backend and frontend images
        run: docker compose build backend frontend
